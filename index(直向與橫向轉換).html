<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正在載入遊戲...</title>
    <style>
        body { background: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; margin: 0; font-family: sans-serif; }
    </style>
</head>
<body>
    <div>正在偵測裝置方向...</div>
    <script>
        function redirect() {
            // 取得當前寬高數值
            const w = window.innerWidth;
            const h = window.innerHeight;
            
            // 判斷方向：寬度大於高度即為橫式
            const isLandscape = w > h;
            const target = isLandscape ? "index(橫式適用).html" : "index(直式適用).html";
            
            // 使用 replace 跳轉，並加上時間戳記 (t=...) 繞過瀏覽器快取
            window.location.replace(target + "?t=" + new Date().getTime());
        }

        // 核心修正：頁面載入後延遲 150ms 執行，確保行動裝置的 layout 數據已就緒
        window.addEventListener("load", () => {
            setTimeout(redirect, 150);
        });

        // 監聽旋轉事件
        window.addEventListener("orientationchange", () => {
            setTimeout(redirect, 300);
        });
    </script>
</body>
</html>
